name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arrowmaze_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d arrowmaze_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:postgres@localhost:5432/arrowmaze_test?schema=public
      JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long-000
      JWT_EXPIRES_IN: 7d
      PORT: "3000"
      ADMIN_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push --skip-generate

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
